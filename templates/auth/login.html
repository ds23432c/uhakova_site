{% extends 'base.html' %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-icon">🔑</div>
    <h1>Войти в аккаунт</h1>
    <p class="auth-desc">Введите ваш email и пароль</p>
    <form method="POST">
      <div class="form-group">
        <label>Электронная почта (email)</label>
        <input type="email" name="email" placeholder="example@mail.ru" required class="form-control form-control-lg">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" placeholder="Ваш пароль" required class="form-control form-control-lg">
      </div>
      <div class="form-check">
        <input type="checkbox" name="remember" id="remember">
        <label for="remember">Запомнить меня</label>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block">
        <i class="fas fa-sign-in-alt"></i> Войти
      </button>
    </form>
    <div class="auth-links">
      <a href="{{ url_for('auth.forgot_password') }}">Забыл пароль</a>
    </div>
    <div class="auth-footer">
      Нет аккаунта? <a href="{{ url_for('auth.register') }}">Зарегистрироваться бесплатно</a>
    </div>
  </div>
</div>
{% endblock %}
