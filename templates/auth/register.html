{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-icon">👤</div>
    <h1>Создать аккаунт</h1>
    <p class="auth-desc">Это бесплатно! Ваш прогресс будет сохраняться.</p>
    <form method="POST">
      <div class="form-group">
        <label>Ваше имя *</label>
        <input type="text" name="name" placeholder="Например: Нина Петровна" required class="form-control form-control-lg">
      </div>
      <div class="form-group">
        <label>Электронная почта (email) *</label>
        <input type="email" name="email" placeholder="example@mail.ru" required class="form-control form-control-lg">
      </div>
      <div class="form-group">
        <label>Пароль *</label>
        <input type="password" name="password" placeholder="Не менее 6 символов" required class="form-control form-control-lg">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Возраст</label>
          <input type="number" name="age" placeholder="65" min="1" max="120" class="form-control form-control-lg">
        </div>
        <div class="form-group">
          <label>Город</label>
          <input type="text" name="city" placeholder="Москва" class="form-control form-control-lg">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block">
        <i class="fas fa-user-plus"></i> Зарегистрироваться
      </button>
    </form>
    <div class="auth-footer">
      Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Войти</a>
    </div>
  </div>
</div>
{% endblock %}
