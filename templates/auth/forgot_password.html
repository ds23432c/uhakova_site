{% extends 'base.html' %}
{% block title %}Восстановление пароля{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-icon">🔒</div>
    <h1>Восстановление пароля</h1>
    <p class="auth-desc">Введите ваш email — мы пришлём инструкции по восстановлению</p>
    <form method="POST">
      <div class="form-group">
        <label>Электронная почта (email)</label>
        <input type="email" name="email" placeholder="example@mail.ru" required class="form-control form-control-lg">
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block">
        <i class="fas fa-envelope"></i> Отправить инструкции
      </button>
    </form>
    <div class="auth-footer">
      <a href="{{ url_for('auth.login') }}">← Вернуться ко входу</a>
    </div>
  </div>
</div>
{% endblock %}
