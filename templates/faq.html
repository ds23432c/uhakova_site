{% extends 'base.html' %}
{% block title %}Часто задаваемые вопросы{% endblock %}
{% block content %}
<div class="page-header">
  <h1><i class="fas fa-question-circle"></i> Часто задаваемые вопросы</h1>
</div>
<div class="faq-list">
  {% for item in faqs %}
  <div class="faq-item">
    <button class="faq-question" onclick="toggleFaq(this)">
      <span>{{ item.question }}</span>
      <i class="fas fa-chevron-down"></i>
    </button>
    <div class="faq-answer">
      <p>{{ item.answer }}</p>
    </div>
  </div>
  {% endfor %}
</div>
<div class="faq-cta">
  <p>Не нашли ответ на свой вопрос?</p>
  <a href="{{ url_for('main.feedback') }}" class="btn btn-primary">Написать нам</a>
</div>
<script>
function toggleFaq(btn) {
  const answer = btn.nextElementSibling;
  const icon = btn.querySelector('i');
  answer.classList.toggle('open');
  icon.classList.toggle('fa-chevron-up');
  icon.classList.toggle('fa-chevron-down');
}
</script>
{% endblock %}
