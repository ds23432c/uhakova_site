{% extends 'admin/base_admin.html' %}
{% block title %}Email рассылка{% endblock %}
{% block content %}
<h1><i class="fas fa-paper-plane"></i> Email рассылка</h1>
<p>Отправить письмо всем зарегистрированным пользователям</p>
<form method="POST" class="admin-form">
  <div class="form-group">
    <label>Тема письма *</label>
    <input type="text" name="subject" class="form-control form-control-lg" placeholder="Например: Новый урок добавлен!" required>
  </div>
  <div class="form-group">
    <label>Текст письма *</label>
    <textarea name="message" rows="10" class="form-control" required placeholder="Текст письма..."></textarea>
  </div>
  <button type="submit" class="btn btn-primary btn-lg" onclick="return confirm('Отправить письмо всем пользователям?')">
    <i class="fas fa-paper-plane"></i> Отправить всем
  </button>
</form>
{% endblock %}
