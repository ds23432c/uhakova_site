{% extends 'admin/base_admin.html' %}
{% block title %}Редактировать урок{% endblock %}
{% block admin_content %}
<h1><i class="fas fa-edit"></i> Редактировать урок</h1>
<form method="POST" class="admin-form">
  <div class="form-group">
    <label>Модуль</label>
    <select name="module_id" class="form-control form-control-lg">
      {% for m in modules %}<option value="{{ m.id }}" {% if m.id == lesson.module_id %}selected{% endif %}>{{ m.order_num }}. {{ m.title }}</option>{% endfor %}
    </select>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Название</label>
      <input type="text" name="title" value="{{ lesson.title }}" class="form-control form-control-lg" required>
    </div>
    <div class="form-group">
      <label>Длительность (мин)</label>
      <input type="number" name="duration_min" value="{{ lesson.duration_min }}" class="form-control form-control-lg">
    </div>
  </div>
  <div class="form-group">
    <label>Содержимое (HTML)</label>
    <textarea name="content" rows="15" class="form-control">{{ lesson.content }}</textarea>
  </div>
  <button type="submit" class="btn btn-primary btn-lg">Сохранить</button>
  <a href="{{ url_for('admin.lessons') }}" class="btn btn-outline btn-lg">Отмена</a>
</form>
{% endblock %}
