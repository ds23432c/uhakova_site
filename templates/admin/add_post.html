{% extends 'admin/base_admin.html' %}
{% block title %}Новая статья{% endblock %}
{% block admin_content %}
<h1><i class="fas fa-plus-circle"></i> Новая статья</h1>
<form method="POST" class="admin-form">
  <div class="form-group">
    <label>Заголовок *</label>
    <input type="text" name="title" class="form-control form-control-lg" required>
  </div>
  <div class="form-group">
    <label>Содержимое (HTML) *</label>
    <textarea name="content" rows="12" class="form-control" required></textarea>
  </div>
  <button type="submit" class="btn btn-primary btn-lg">Опубликовать</button>
  <a href="{{ url_for('admin.blog') }}" class="btn btn-outline btn-lg">Отмена</a>
</form>
{% endblock %}
