{% extends 'admin/base_admin.html' %}
{% block title %}Новая статья{% endblock %}
{% block page_title %}<i class="fas fa-plus-circle"></i> Новая статья{% endblock %}
{% block content %}
<div style="max-width:900px">
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Заголовок <span class="required">*</span></label>
        <input type="text" name="title" class="form-control" placeholder="Например: Как защитить себя от мошенников" required>
      </div>
      <div class="form-group">
        <label>Текст статьи <span class="required">*</span></label>
        <textarea name="content" class="tinymce"></textarea>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" name="is_published" checked style="width:18px;height:18px">
          Опубликовать сразу
        </label>
      </div>
      <div style="display:flex;gap:12px">
        <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save"></i> Опубликовать</button>
        <a href="{{ url_for('admin.blog') }}" class="btn btn-outline btn-lg">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
