{% extends 'admin/base_admin.html' %}
{% block title %}Добавить урок{% endblock %}
{% block content %}
<h1><i class="fas fa-plus-circle"></i> Добавить урок</h1>
<form method="POST" class="admin-form">
  <div class="form-group">
    <label>Модуль *</label>
    <select name="module_id" class="form-control form-control-lg" required>
      {% for m in modules %}<option value="{{ m.id }}">{{ m.order_num }}. {{ m.title }}</option>{% endfor %}
    </select>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Название урока *</label>
      <input type="text" name="title" class="form-control form-control-lg" required>
    </div>
    <div class="form-group">
      <label>Порядковый номер</label>
      <input type="number" name="order_num" class="form-control form-control-lg" value="1" min="1">
    </div>
    <div class="form-group">
      <label>Длительность (мин)</label>
      <input type="number" name="duration_min" class="form-control form-control-lg" value="10" min="1">
    </div>
  </div>
  <div class="form-group">
    <label>Содержимое урока (HTML) *</label>
    <textarea name="content" rows="15" class="form-control" required placeholder="<h2>...</h2><p>...</p>"></textarea>
  </div>
  <button type="submit" class="btn btn-primary btn-lg">Сохранить урок</button>
  <a href="{{ url_for('admin.lessons') }}" class="btn btn-outline btn-lg">Отмена</a>
</form>
{% endblock %}
