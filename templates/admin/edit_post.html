{% extends 'admin/base_admin.html' %}
{% block title %}Редактировать статью{% endblock %}
{% block page_title %}<i class="fas fa-edit"></i> Редактировать статью{% endblock %}
{% block content %}
<div style="max-width:900px">
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Заголовок <span class="required">*</span></label>
        <input type="text" name="title" class="form-control" value="{{ post.title }}" required>
      </div>
      <div class="form-group">
        <label>Текст статьи</label>
        <textarea name="content" class="tinymce">{{ post.content }}</textarea>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" name="is_published" {% if post.is_published %}checked{% endif %} style="width:18px;height:18px">
          Опубликовано
        </label>
      </div>
      <div style="display:flex;gap:12px">
        <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save"></i> Сохранить</button>
        <a href="{{ url_for('blog.post', post_id=post.id) }}" target="_blank" class="btn btn-outline btn-lg">
          <i class="fas fa-eye"></i> Предпросмотр
        </a>
        <a href="{{ url_for('admin.blog') }}" class="btn btn-outline btn-lg">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
