{% extends 'base.html' %}
{% block title %}Новая тема{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:700px">
    <h1><i class="fas fa-plus-circle"></i> Новая тема на форуме</h1>
    <form method="POST">
      <div class="form-group">
        <label>Заголовок темы *</label>
        <input type="text" name="title" class="form-control form-control-lg" placeholder="Например: Как найти кнопку включения?" required>
      </div>
      <div class="form-group">
        <label>Текст вопроса *</label>
        <textarea name="text" rows="6" class="form-control" placeholder="Опишите ваш вопрос подробнее..." required></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block">Опубликовать тему</button>
    </form>
    <div class="auth-footer"><a href="{{ url_for('forum.forum') }}">← Назад к форуму</a></div>
  </div>
</div>
{% endblock %}
